<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CraftMarket — Minecraft Marketplace</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323:wght@400&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <div class="logo">
        <img src="https://minecraft.wiki/images/Grass_Block_JE7_BE6.png" alt="Grass Block" class="logo-icon" onerror="this.style.display='none'" />
        <div>
          <span class="logo-title">CraftMarket</span>
          <span class="logo-sub">Minecraft Marketplace</span>
        </div>
      </div>
      <nav class="header-nav">
        <span id="listing-count" class="badge">0 annonces</span>
        <span class="discord-badge">
          <span class="discord-dot"></span> Discord connecté
        </span>
        <button class="btn-primary" id="open-modal-btn">⚒ Vendre un item</button>
      </nav>
    </div>
  </header>

  <!-- SEARCH & FILTERS -->
  <section class="filter-bar">
    <div class="filter-inner">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" id="search-input" placeholder="Rechercher un item..." class="search-input" />
      </div>
      <div class="filter-tabs" id="filter-tabs">
        <button class="tab-btn active" data-cat="all">Tous</button>
        <button class="tab-btn" data-cat="weapons">⚔ Armes</button>
        <button class="tab-btn" data-cat="tools">⛏ Outils</button>
        <button class="tab-btn" data-cat="armor">🛡 Armure</button>
        <button class="tab-btn" data-cat="resources">💎 Ressources</button>
        <button class="tab-btn" data-cat="blocks">🧱 Blocs</button>
        <button class="tab-btn" data-cat="food">🍎 Nourriture</button>
        <button class="tab-btn" data-cat="misc">✨ Divers</button>
      </div>
    </div>
  </section>

  <!-- CATALOGUE GRID -->
  <main class="catalogue-section">
    <div id="catalogue-grid" class="catalogue-grid"></div>
    <div id="empty-state" class="empty-state" style="display:none">
      <p>🪣 Aucune annonce trouvée.</p>
      <p class="empty-sub">Soyez le premier à vendre quelque chose !</p>
    </div>
  </main>

  <!-- MODAL: AJOUTER ANNONCE -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title">⚒ Nouvelle Annonce</h2>
        <button class="modal-close" id="close-modal-btn">✕</button>
      </div>
      <div class="modal-body">
        <form id="listing-form" novalidate>

          <div class="form-group">
            <label for="item-search">Item Minecraft <span class="req">*</span></label>
            <div class="item-selector">
              <input type="text" id="item-search" placeholder="Tapez pour chercher un item..." autocomplete="off" class="form-input" />
              <div id="item-dropdown" class="item-dropdown hidden"></div>
              <div id="selected-item-preview" class="selected-preview hidden">
                <img id="preview-img" src="" alt="" />
                <span id="preview-name"></span>
                <button type="button" id="clear-item-btn" class="clear-btn">✕</button>
              </div>
              <input type="hidden" id="selected-item-id" name="item_id" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="price-input">Prix (💰 coins) <span class="req">*</span></label>
              <input type="number" id="price-input" class="form-input" placeholder="ex: 500" min="1" max="999999" />
            </div>
            <div class="form-group">
              <label for="seller-input">Pseudo vendeur <span class="req">*</span></label>
              <input type="text" id="seller-input" class="form-input" placeholder="ex: Notch42" maxlength="24" />
            </div>
          </div>

          <div class="form-group">
            <label for="desc-input">Description</label>
            <textarea id="desc-input" class="form-input form-textarea" placeholder="Détails, enchantements, état..." rows="3" maxlength="300"></textarea>
          </div>

          <div class="discord-status">
            <span class="discord-dot"></span>
            <span>Notifications Discord activées — annonce publiée automatiquement sur votre serveur</span>
          </div>

          <div id="form-error" class="form-error hidden"></div>

          <div class="form-actions">
            <button type="button" class="btn-secondary" id="cancel-btn">Annuler</button>
            <button type="submit" class="btn-primary" id="submit-btn">📢 Publier l'annonce</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <footer class="site-footer">
    <p>CraftMarket — Fait avec ❤ pour la communauté Minecraft</p>
  </footer>

  <script src="items.json" type="application/json" id="items-data"></script>
  <script src="script.js"></script>
</body>
</html>
